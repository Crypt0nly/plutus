<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/plutus.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plutus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply theme before first paint to prevent flash of wrong theme
      (function() {
        var theme = localStorage.getItem('plutus-theme') || 'dark';
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-D-JOwlOR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DtA7Ra4o.css">
  </head>
  <body class="bg-gray-950 text-gray-100 antialiased">
    <div id="root"></div>
    <!-- Custom theme: injected AFTER all other CSS to guarantee cascade priority -->
    <script>
      (function() {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = '/api/customization/theme.css?t=' + Date.now();
        document.head.appendChild(link);
      })();
    </script>
  </body>
</html>
