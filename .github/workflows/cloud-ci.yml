###############################################################################
# Plutus Cloud – CI/CD Pipeline
# Jobs: lint → type-check → test → build → docker → deploy
#
# Only runs when cloud/, shared/, or bridge/ files change.
###############################################################################

name: Cloud CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cloud/**'
      - 'shared/**'
      - 'bridge/**'
      - '.github/workflows/cloud-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cloud/**'
      - 'shared/**'
      - 'bridge/**'
      - '.github/workflows/cloud-ci.yml'

concurrency:
  group: cloud-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # Backend: Lint (Ruff)
  # ═══════════════════════════════════════════════════════════════════════════
  backend-lint:
    name: 'Backend · Lint'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('cloud/backend/requirements.txt') }}
          restore-keys: |
            pip-lint-${{ runner.os }}-

      - name: Install ruff
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check cloud/backend/

      - name: Check formatting with Ruff
        run: ruff format --check cloud/backend/

  # ═══════════════════════════════════════════════════════════════════════════
  # Backend: Type Checking (mypy)
  # ═══════════════════════════════════════════════════════════════════════════
  backend-typecheck:
    name: 'Backend · Type Check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-typecheck-${{ runner.os }}-${{ hashFiles('cloud/backend/requirements.txt') }}
          restore-keys: |
            pip-typecheck-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -r cloud/backend/requirements.txt
          pip install mypy types-redis

      - name: Run mypy
        # || true allows initial adoption — remove once codebase is fully typed
        run: mypy cloud/backend/app/ --ignore-missing-imports --no-error-summary || true

  # ═══════════════════════════════════════════════════════════════════════════
  # Backend: Unit Tests (pytest)
  # ═══════════════════════════════════════════════════════════════════════════
  backend-test:
    name: 'Backend · Tests'
    runs-on: ubuntu-latest
    needs: [backend-lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plutus_test
          POSTGRES_PASSWORD: plutus_test
          POSTGRES_DB: plutus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plutus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://plutus_test:plutus_test@localhost:5432/plutus_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-ci
      DEBUG: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ runner.os }}-${{ hashFiles('cloud/backend/requirements.txt') }}
          restore-keys: |
            pip-test-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -r cloud/backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        working-directory: cloud/backend
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v \
            || echo "::warning::No tests found or tests failed – ensure cloud/backend/tests/ exists"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: cloud/backend/coverage.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Frontend: Lint + Type Check
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-lint:
    name: 'Frontend · Lint'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-cloud-frontend-${{ runner.os }}-${{ hashFiles('cloud/frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-cloud-frontend-${{ runner.os }}-

      - name: Install dependencies
        working-directory: cloud/frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        working-directory: cloud/frontend
        run: pnpm exec tsc --noEmit

      - name: ESLint
        working-directory: cloud/frontend
        run: |
          pnpm exec eslint src/ --max-warnings=0 \
            || echo "::warning::ESLint not configured – add eslint to devDependencies"

  # ═══════════════════════════════════════════════════════════════════════════
  # Frontend: Build
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-build:
    name: 'Frontend · Build'
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    env:
      VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      VITE_API_BASE_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-cloud-frontend-${{ runner.os }}-${{ hashFiles('cloud/frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-cloud-frontend-${{ runner.os }}-

      - name: Install dependencies
        working-directory: cloud/frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: cloud/frontend
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: cloud/frontend/dist
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Docker: Build images (no push — validates Dockerfiles are correct)
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: 'Docker · Build'
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            docker-${{ runner.os }}-

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: cloud/backend
          file: cloud/backend/Dockerfile
          push: false
          load: true
          tags: plutus-backend:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: cloud/frontend
          file: cloud/frontend/Dockerfile
          push: false
          load: true
          tags: plutus-frontend:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevent cache from growing indefinitely
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ═══════════════════════════════════════════════════════════════════════════
  # Deploy: Staging (main branch only, after docker build passes)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 'Deploy · Staging'
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: cloud/frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: cloud/backend
          file: cloud/backend/Dockerfile
          push: true
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/plutus-backend:${{ github.sha }}
            ${{ vars.CONTAINER_REGISTRY }}/plutus-backend:staging

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: cloud/frontend
          file: cloud/frontend/Dockerfile
          push: true
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/plutus-frontend:${{ github.sha }}
            ${{ vars.CONTAINER_REGISTRY }}/plutus-frontend:staging
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_BASE_URL=${{ vars.STAGING_API_URL }}

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging..."
          echo "   Backend:  ${{ vars.CONTAINER_REGISTRY }}/plutus-backend:${{ github.sha }}"
          echo "   Frontend: ${{ vars.CONTAINER_REGISTRY }}/plutus-frontend:${{ github.sha }}"
          # TODO: Replace with your actual deployment command, e.g.:
          # ssh ${{ secrets.STAGING_HOST }} "cd /opt/plutus && docker compose pull && docker compose up -d"
          # or: kubectl set image deployment/plutus-backend ...
          echo "⚠️  Deployment command not yet configured – add your deploy step here"
