name: Publish to PyPI

# Build compiled platform wheels and publish to PyPI.
#
# Every push to main automatically:
#   1. Bumps the patch version FIRST (so each commit gets a unique version)
#   2. Builds compiled wheels for all platforms (with UI built inline)
#   3. Publishes to PyPI as a stable release
#   4. Creates a GitHub Release
#
# Protected modules (core orchestration, PC control, workers) are compiled
# to native .so/.pyd via Cython so the source is not distributed.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue concurrent runs instead of cancelling them. This ensures the
# in-progress run finishes its publish + version bump before the next
# run starts, so every commit gets a unique version number.
concurrency:
  group: pypi-publish
  cancel-in-progress: false

permissions:
  contents: write   # Required for version bump commit + release creation
  id-token: write   # Required for PyPI trusted publishing

jobs:
  # ── Bump version FIRST so each run has a unique version ─────────
  #
  # By bumping before building, we guarantee that even if two commits
  # land in quick succession, the queued second run will see the bumped
  # version from the first run and publish under a new number.
  bump-version:
    # Skip version-bump commits to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can rebase on latest main
          fetch-depth: 0
          # Use the default GITHUB_TOKEN — the [skip ci] in the commit
          # message prevents the bump commit from re-triggering this workflow
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest and bump version
        id: bump
        run: |
          # Pull latest in case the previous queued run bumped while we waited
          git pull --rebase origin main

          # Read current version
          VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          echo "Current version: ${VERSION}"

          # Check if this version already exists on PyPI
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/plutus-ai/${VERSION}/json")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version ${VERSION} already on PyPI — bumping first"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION}\"/" plutus/__init__.py
            git add plutus/__init__.py
            git commit -m "Bump version to ${VERSION} [skip ci]"
            # Retry push in case of concurrent pushes
            for i in 1 2 3; do
              git push && break
              echo "Push failed (attempt $i), rebasing and retrying..."
              git pull --rebase origin main
              sleep 2
            done
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Will publish version: ${VERSION}"

  # ── Build compiled wheels per platform ────────────────────────────
  #
  # Each runner builds the React frontend itself (npm cache makes this
  # fast after the first run), eliminating the serial build-ui job.
  build-wheels:
    needs: [bump-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            cibw_archs: x86_64
            artifact_name: wheels-linux-x86_64
          # macOS arm64 (Apple Silicon) — Intel users can use Rosetta
          # macOS arm64 (Apple Silicon — M1/M2/M3/M4)
          - os: macos-latest
            cibw_archs: arm64
            artifact_name: wheels-macos-arm64
          # macOS x86_64 (Intel — covers all Macs pre-2021 including Monterey/Ventura on Intel)
          # macos-13 is the last GitHub-hosted Intel runner; macos-14+ are arm64 only.
          - os: macos-13
            cibw_archs: x86_64
            artifact_name: wheels-macos-x86_64
          # Windows x86_64

          # Windows x86_64
          - os: windows-latest
            cibw_archs: AMD64
            artifact_name: wheels-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Re-fetch to pick up the version bump commit
          ref: main

      # ── Build the React frontend inline ──────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install & build frontend
        run: |
          cd ui
          npm ci
          npm run build

      # ── Build wheels with cibuildwheel ───────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show version to publish
        shell: bash
        run: |
          VERSION=$(python -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          echo "Publishing version: ${VERSION}"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          # Build for Python 3.11, 3.12, 3.13, 3.14
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

          # Skip musllinux (Alpine) and 32-bit — not worth the build time
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"

          # Use manylinux_2_28 (default in v3, but explicit for clarity)
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Pin auditwheel to a single manylinux tag — without --only-plat,
          # auditwheel adds legacy compat tags (manylinux2014 + _2_17 + _2_28)
          # which PyPI rejects with 400 Bad Request.
          # --plat sets the target tag; --only-plat (boolean flag) tells
          # auditwheel to use ONLY that tag and strip all legacy compat tags.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --plat manylinux_2_28_x86_64 --only-plat

          # Before building: clean stale .so/.pyd from prior Python versions,
          # then install Cython and compile protected modules.
          # Why clean? cibuildwheel builds multiple Python versions sequentially
          # in the same source tree. build_ext --inplace writes ABI-tagged .so
          # files (e.g. agent.cpython-311-*.so, agent.cpython-312-*.so) that
          # don't overwrite each other — they accumulate. The hatchling glob
          # artifacts=["plutus/**/*.so"] picks up ALL of them, so the cp314
          # wheel ends up 4x larger (containing .so files for every version).
          CIBW_BEFORE_BUILD: >
            python -c "import pathlib; [f.unlink() for f in pathlib.Path('plutus').rglob('*.so')]" &&
            python -c "import pathlib; [f.unlink() for f in pathlib.Path('plutus').rglob('*.pyd')]" &&
            pip install "cython>=3.2.4" "setuptools>=69.0" &&
            python build_compiled.py build_ext --inplace

          # The actual wheel build (default in v3, but explicit for clarity)
          CIBW_BUILD_FRONTEND: "build"

          # Upgrade pip in test environment so pre-built wheels (e.g. tiktoken)
          # are found on newer Python versions like 3.14.
          CIBW_BEFORE_TEST: "python -m pip install --upgrade pip"

          # Test that the compiled wheel actually imports correctly
          CIBW_TEST_COMMAND: >
            python -c "from plutus.core.agent import AgentRuntime; print('OK: agent');
            from plutus.core.planner import PlanManager; print('OK: planner');
            from plutus.core.worker_pool import WorkerPool; print('OK: workers');
            from plutus.tools.pc_control import PCControlTool; print('OK: pc_control');
            print('All compiled imports OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl

  # ── Publish wheels to PyPI (no sdist — open-core protection) ─────
  #
  # Only compiled platform wheels are published. No source distribution
  # is uploaded so that unsupported platforms cannot fall back to raw
  # Python source, which would expose protected open-core modules.
  publish:
    needs: [build-wheels, bump-version]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # OIDC for PyPI trusted publishing + attestations
      attestations: write # Required for sigstore attestations

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Check if version already exists on PyPI
        id: version_check
        run: |
          VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/plutus-ai/${VERSION}/json")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "::warning::Version ${VERSION} already exists on PyPI — skipping upload."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VERSION} not on PyPI — proceeding with upload."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: steps.version_check.outputs.exists == 'false'
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true

      - name: List artifacts
        if: steps.version_check.outputs.exists == 'false'
        run: ls -la dist/

      - name: Publish to PyPI
        if: steps.version_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Skip wheels already uploaded by a previous partial run so that
          # retries don't fail with 400 on duplicate filenames.
          skip-existing: true
          verbose: true
          # Disable attestations — the action now defaults attestations:true
          # but PyPI returns 400 if the trusted publisher config doesn't match
          # the attestation identity (environment, workflow path, etc.).
          attestations: false

  # ── Create GitHub Release ───────────────────────────────────────
  post-release:
    needs: [publish, bump-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Create GitHub Release
        run: |
          VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          echo "Creating release v${VERSION}"

          # Check if release already exists (idempotent)
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "Release v${VERSION} already exists — skipping"
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
