name: Publish to PyPI

# Build compiled platform wheels and publish to PyPI.
#
# Every push to main automatically:
#   1. Builds compiled wheels for all platforms
#   2. Publishes to PyPI as a stable release
#   3. Creates a GitHub Release
#   4. Bumps the patch version for the next release
#
# Protected modules (core orchestration, PC control, workers) are compiled
# to native .so/.pyd via Cython so the source is not distributed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # Required for version bump commit + release creation
  id-token: write   # Required for PyPI trusted publishing

jobs:
  # ── Step 1: Build the React frontend ────────────────────────────
  build-ui:
    runs-on: ubuntu-latest
    # Skip version-bump commits to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install & build frontend
        run: |
          cd ui
          npm ci
          npm run build

      - name: Show version to publish
        run: |
          VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          echo "Publishing version: ${VERSION}"

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - uses: actions/upload-artifact@v4
        with:
          name: source
          path: plutus/__init__.py

  # ── Step 2: Build compiled wheels per platform ──────────────────
  build-wheels:
    needs: build-ui
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            cibw_archs: x86_64
            artifact_name: wheels-linux-x86_64
          # macOS x86_64 (Intel)
          - os: macos-latest
            cibw_archs: x86_64
            artifact_name: wheels-macos-x86_64
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            cibw_archs: arm64
            artifact_name: wheels-macos-arm64
          # Windows x86_64
          - os: windows-latest
            cibw_archs: AMD64
            artifact_name: wheels-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - uses: actions/download-artifact@v4
        with:
          name: source
          path: plutus/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          # Build for Python 3.11, 3.12, 3.13, 3.14
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

          # Skip musllinux (Alpine) and 32-bit — not worth the build time
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"

          # Use manylinux_2_28 (default in v3, but explicit for clarity)
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Before building: install Cython and compile protected modules.
          # v3 no longer preinstalls setuptools/wheel, so we must install them.
          # Pin setuptools<82 to avoid PEP 639 license field incompatibilities.
          CIBW_BEFORE_BUILD: >
            pip install "cython>=3.0" "setuptools>=69.0,<82" &&
            python build_compiled.py build_ext --inplace

          # The actual wheel build (default in v3, but explicit for clarity)
          CIBW_BUILD_FRONTEND: "build"

          # Upgrade pip in test environment so pre-built wheels (e.g. tiktoken)
          # are found. Must use "python -m pip" because Windows rejects bare
          # "pip install --upgrade pip" when upgrading itself.
          CIBW_BEFORE_TEST: "python -m pip install --upgrade pip"

          # Test that the compiled wheel actually imports correctly
          CIBW_TEST_COMMAND: >
            python -c "from plutus.core.agent import AgentRuntime; print('OK: agent');
            from plutus.core.planner import PlanManager; print('OK: planner');
            from plutus.core.worker_pool import WorkerPool; print('OK: workers');
            from plutus.tools.pc_control import PCControlTool; print('OK: pc_control');
            print('All compiled imports OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl

  # ── Step 3: Publish wheels to PyPI (no sdist — open-core protection) ──
  #
  # Only compiled platform wheels are published. No source distribution
  # is uploaded so that unsupported platforms cannot fall back to raw
  # Python source, which would expose protected open-core modules.
  publish:
    needs: [build-wheels]
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Step 4: Create release and bump version for next time ───────
  post-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        run: |
          VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          echo "Creating release v${VERSION}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version for next release
        run: |
          VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/__version__ = \".*\"/__version__ = \"${NEXT_VERSION}\"/" plutus/__init__.py
          echo "Bumped: ${VERSION} → ${NEXT_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plutus/__init__.py
          git commit -m "Bump version to ${NEXT_VERSION} [skip ci]"
          git push
