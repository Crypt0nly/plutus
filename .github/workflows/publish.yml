name: Publish to PyPI

# Build compiled platform wheels and publish to PyPI.
#
# Protected modules (core orchestration, PC control, workers) are compiled
# to native .so/.pyd via Cython so the source is not distributed.
# One wheel is built per platform (Linux, macOS, Windows) x Python version.

on:
  release:
    types: [published]

  # Auto-publish on every push to main
  push:
    branches: [main]

  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: read   # Required for checkout on private repos
  id-token: write  # Required for trusted publishing

jobs:
  # ── Step 1: Build the React frontend ────────────────────────────
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install & build frontend
        run: |
          cd ui
          npm ci
          npm run build

      # On push-to-main builds, stamp a unique dev version so PyPI accepts it.
      # Releases keep the version from __init__.py as-is.
      - name: Stamp dev version (push builds only)
        if: github.event_name == 'push'
        run: |
          TIMESTAMP=$(date +%s)
          BASE_VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          DEV_VERSION="${BASE_VERSION}.dev${TIMESTAMP}"
          sed -i "s/__version__ = \".*\"/__version__ = \"${DEV_VERSION}\"/" plutus/__init__.py
          echo "Stamped version: ${DEV_VERSION}"
          cat plutus/__init__.py

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      # Upload the (possibly version-stamped) source so all downstream jobs use it
      - uses: actions/upload-artifact@v4
        with:
          name: source
          path: |
            plutus/__init__.py

  # ── Step 2: Build compiled wheels per platform ──────────────────
  build-wheels:
    needs: build-ui
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            cibw_archs: x86_64
            artifact_name: wheels-linux-x86_64
          # macOS x86_64 (Intel) — macos-13 is deprecated, use macos-latest with cross-compile
          - os: macos-latest
            cibw_archs: x86_64
            artifact_name: wheels-macos-x86_64
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            cibw_archs: arm64
            artifact_name: wheels-macos-arm64
          # Windows x86_64
          - os: windows-latest
            cibw_archs: AMD64
            artifact_name: wheels-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      # Overwrite with version-stamped __init__.py (for push builds)
      - uses: actions/download-artifact@v4
        with:
          name: source
          path: plutus/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          # Build for Python 3.11, 3.12, 3.13
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

          # Skip musllinux (Alpine) and 32-bit — not worth the build time
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"

          # Use manylinux_2_28 instead of the default manylinux_2014 so that
          # pre-built wheels for dependencies like tiktoken are available
          # (tiktoken only publishes manylinux_2_28 wheels, not _2014).
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Before building: install Cython and compile protected modules.
          # Do NOT run strip_sources.py here — it deletes .py files which
          # breaks subsequent Python version builds. Instead, pyproject.toml
          # excludes protected .py files from the wheel statically.
          # Pin setuptools<82 to avoid PEP 639 license field incompatibilities.
          CIBW_BEFORE_BUILD: >
            pip install "cython>=3.0" "setuptools>=69.0,<82" &&
            python build_compiled.py build_ext --inplace

          # The actual wheel build
          CIBW_BUILD_FRONTEND: "build"

          # Upgrade pip in test environment so pre-built wheels (e.g. tiktoken)
          # are found. Must use "python -m pip" because Windows rejects bare
          # "pip install --upgrade pip" when upgrading itself.
          CIBW_BEFORE_TEST: "python -m pip install --upgrade pip"

          # Test that the compiled wheel actually imports correctly
          CIBW_TEST_COMMAND: >
            python -c "from plutus.core.agent import AgentRuntime; print('OK: agent');
            from plutus.core.planner import PlanManager; print('OK: planner');
            from plutus.core.worker_pool import WorkerPool; print('OK: workers');
            from plutus.tools.pc_control import PCControlTool; print('OK: pc_control');
            print('All compiled imports OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl

  # ── Step 3: Build source distribution (no compiled code) ────────
  # The sdist is for users who want to build from source themselves.
  # It includes all .py files. The compiled wheels are the primary
  # distribution method.
  build-sdist:
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      # Overwrite with version-stamped __init__.py (for push builds)
      - uses: actions/download-artifact@v4
        with:
          name: source
          path: plutus/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Step 4: Publish everything to PyPI ──────────────────────────
  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi  # Create this environment in GitHub repo settings

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing — no API token needed
        # Configure at: https://pypi.org/manage/account/publishing/
