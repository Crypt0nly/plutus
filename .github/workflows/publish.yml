name: Publish to PyPI

# Build compiled platform wheels and publish to PyPI.
#
# Every push to main automatically:
#   1. Builds compiled wheels for all platforms (with UI built inline)
#   2. Publishes to PyPI as a stable release
#   3. Creates a GitHub Release
#   4. Bumps the patch version for the next release
#
# Protected modules (core orchestration, PC control, workers) are compiled
# to native .so/.pyd via Cython so the source is not distributed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # Required for version bump commit + release creation
  id-token: write   # Required for PyPI trusted publishing

jobs:
  # ── Build compiled wheels per platform ────────────────────────────
  #
  # Each runner builds the React frontend itself (npm cache makes this
  # fast after the first run), eliminating the serial build-ui job.
  build-wheels:
    # Skip version-bump commits to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            cibw_archs: x86_64
            artifact_name: wheels-linux-x86_64
          # macOS arm64 (Apple Silicon) — Intel users can use Rosetta
          - os: macos-latest
            cibw_archs: arm64
            artifact_name: wheels-macos-arm64
          # Windows x86_64
          - os: windows-latest
            cibw_archs: AMD64
            artifact_name: wheels-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Build the React frontend inline ──────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install & build frontend
        run: |
          cd ui
          npm ci
          npm run build

      # ── Build wheels with cibuildwheel ───────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show version to publish
        shell: bash
        run: |
          VERSION=$(python -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          echo "Publishing version: ${VERSION}"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          # Build for Python 3.11, 3.12, 3.13, 3.14
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

          # Skip musllinux (Alpine) and 32-bit — not worth the build time
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"

          # Use manylinux_2_28 (default in v3, but explicit for clarity)
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Pin auditwheel to a single manylinux tag — without explicit
          # --only-plat, auditwheel adds legacy compat tags (manylinux2014 +
          # _2_17 + _2_28) which PyPI rejects with 400 Bad Request.
          # --only-plat (auditwheel 6+) replaces ALL tags with the specified
          # one, unlike --plat which only adds it alongside legacy tags.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --only-plat manylinux_2_28_x86_64

          # Before building: install Cython and compile protected modules.
          # v3 no longer preinstalls setuptools/wheel, so we must install them.
          # Note: setuptools here is only used for Cython compilation
          # (build_ext), NOT for building the wheel (hatchling does that),
          # so PEP 639 metadata concerns don't apply. Python 3.14 requires
          # setuptools 82+ for C API compatibility.
          CIBW_BEFORE_BUILD: >
            pip install "cython>=3.2.4" "setuptools>=69.0" &&
            python build_compiled.py build_ext --inplace

          # The actual wheel build (default in v3, but explicit for clarity)
          CIBW_BUILD_FRONTEND: "build"

          # Upgrade pip in test environment so pre-built wheels (e.g. tiktoken)
          # are found on newer Python versions like 3.14.
          CIBW_BEFORE_TEST: "python -m pip install --upgrade pip"

          # Test that the compiled wheel actually imports correctly
          CIBW_TEST_COMMAND: >
            python -c "from plutus.core.agent import AgentRuntime; print('OK: agent');
            from plutus.core.planner import PlanManager; print('OK: planner');
            from plutus.core.worker_pool import WorkerPool; print('OK: workers');
            from plutus.tools.pc_control import PCControlTool; print('OK: pc_control');
            print('All compiled imports OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl

  # ── Publish wheels to PyPI (no sdist — open-core protection) ─────
  #
  # Only compiled platform wheels are published. No source distribution
  # is uploaded so that unsupported platforms cannot fall back to raw
  # Python source, which would expose protected open-core modules.
  publish:
    needs: [build-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # OIDC for PyPI trusted publishing + attestations
      attestations: write # Required for sigstore attestations

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Skip wheels already uploaded by a previous partial run so that
          # retries don't fail with 400 on duplicate filenames.
          skip-existing: true

  # ── Create release and bump version for next time ────────────────
  post-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        run: |
          VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          echo "Creating release v${VERSION}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version for next release
        run: |
          VERSION=$(python3 -c "exec(open('plutus/__init__.py').read()); print(__version__)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/__version__ = \".*\"/__version__ = \"${NEXT_VERSION}\"/" plutus/__init__.py
          echo "Bumped: ${VERSION} → ${NEXT_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plutus/__init__.py
          git commit -m "Bump version to ${NEXT_VERSION} [skip ci]"
          git push
